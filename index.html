<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>合伙空间 V26.0·暴力显形版</title>
    <style>
        :root { --primary: #007AFF; --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; --accent: #FF2D55; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }
        
        .main-app { padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        
        /* 统计看板 */
        .stats-bar { background: var(--card); padding: 15px; border-radius: 20px; display: flex; justify-content: space-around; border: 1px solid #333; margin-bottom: 20px; }
        .stat-item { text-align: center; }
        .stat-item b { display: block; font-size: 1.2rem; color: var(--primary); }
        .stat-item span { font-size: 0.7rem; color: #8E8E93; }

        /* 日历格子：强制显示 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 8px; 
            flex: 1; 
            overflow-y: auto;
            min-height: 300px; /* 预留高度防止预览图塌陷 */
        }
        .day { 
            background: #2C2C2E; 
            aspect-ratio: 0.8; 
            border-radius: 10px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            border: 1px solid #3A3A3C;
            cursor: pointer;
        }
        .day b { font-size: 1rem; color: #fff; }
        .day small { font-size: 0.5rem; color: var(--primary); margin-top: 2px; }
        .day.has-data { background: var(--primary); border-color: #fff; }

        /* 空间层 */
        .space-overlay { position: fixed; inset: 0; left: 100%; background: #000; z-index: 1000; transition: 0.4s; display: flex; flex-direction: column; }
        .space-active .space-overlay { left: 0; }
        .ins-feed { flex: 1; overflow-y: auto; padding: 15px; }

        .bottom-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 30px; border-radius: 25px; font-weight: bold; z-index: 500; border: none; }
        
        /* 弹窗样式 */
        .modal { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); z-index: 5000; }
        .modal-content { background: #1C1C1E; padding: 20px; border-radius: 20px; width: 80%; border: 1px solid #333; }
        .modal input, .modal select { width: 100%; padding: 10px; margin: 10px 0; background: #2C2C2E; color: #fff; border: none; border-radius: 8px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body id="bodyRoot">

    <div class="main-app">
        <div class="stats-bar">
            <div class="stat-item"><span>总签到</span><b id="totalDays">0</b></div>
            <div class="stat-item"><span>总热量</span><b id="totalKcal">0</b></div>
        </div>
        <div id="syncStatus" style="font-size:10px; color:#8E8E93; text-align:center; margin-bottom:10px;">⚡ 格子强制加载中...</div>
        
        <div class="grid" id="grid"></div>
        
        <button class="bottom-btn" onclick="toggleSpace(true)">✨ 动态空间</button>
    </div>

    <div class="space-overlay" id="spaceLayer">
        <div style="padding: 50px 20px 15px; display:flex; justify-content:space-between; border-bottom:1px solid #333;">
            <span onclick="toggleSpace(false)" style="color:var(--primary)">← 返回</span>
            <b>合伙动态</b>
            <span onclick="openModal('postModal')" style="color:var(--primary); font-size:1.5rem">+</span>
        </div>
        <div id="insFeed" class="ins-feed"></div>
    </div>

    <div class="modal" id="fitModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0">运动签到</h3>
            <select id="fitType"><option value="10">🏃 跑步</option><option value="8">🏋️ 力量训练</option><option value="15">跳绳</option></select>
            <input type="number" id="fitDuration" value="30" placeholder="时长(分钟)">
            <button class="btn-save" onclick="saveCheckIn()">保存签到</button>
            <button onclick="closeModals()" style="width:100%; background:none; color:#8E8E93; border:none; margin-top:10px;">取消</button>
        </div>
    </div>

    <script>
        const KV_URL = "https://pleasing-hare-88101.upstash.io";
        const KV_TOKEN = "gQAAAAAAAVglAAIncDJiZmE2Mjk5YWZkZTY0YTBmYTBlowU0YWI0NmJiMzUwNHAyODgxMDE";
        
        let db = { calendar: {}, posts: [] };
        let curKey = null;

        // 核心渲染函数：确保它在任何时候都能被调用
        function renderGrid() {
            const grid = document.getElementById('grid');
            if(!grid) return;
            grid.innerHTML = '';
            const now = new Date();
            const y = now.getFullYear(), m = now.getMonth();
            const days = new Date(y, m + 1, 0).getDate();
            
            let tk = 0, td = 0;
            for(let i=1; i<=days; i++) {
                const key = `${y}-${m+1}-${i}`;
                const data = db.calendar[key];
                const node = document.createElement('div');
                node.className = `day ${data ? 'has-data' : ''}`;
                node.innerHTML = `<b>${i}</b><small>${data ? '已打卡' : ''}</small>`;
                node.onclick = () => { curKey = key; openModal('fitModal'); };
                grid.appendChild(node);
                if(data) { td++; tk += data.kcal; }
            }
            document.getElementById('totalDays').innerText = td;
            document.getElementById('totalKcal').innerText = tk;
        }

        // 初始化加载
        async function init() {
            renderGrid(); // 先刷出一遍空的格子，保证预览图有内容
            const local = localStorage.getItem('fit_db_v26');
            if(local) { db = JSON.parse(local); renderGrid(); }

            try {
                const res = await fetch(`${KV_URL}/get/app_data`, { headers: { Authorization: `Bearer ${KV_TOKEN}` } });
                const r = await res.json();
                if(r?.result) {
                    db = typeof r.result === 'string' ? JSON.parse(r.result) : r.result;
                    localStorage.setItem('fit_db_v26', JSON.stringify(db));
                    renderGrid();
                    document.getElementById('syncStatus').innerText = "✅ 同步成功";
                }
            } catch(e) { document.getElementById('syncStatus').innerText = "⚠️ 离线模式"; }
        }

        async function saveCheckIn() {
            const type = document.getElementById('fitType');
            const dur = document.getElementById('fitDuration').value;
            db.calendar[curKey] = { type: type.options[type.selectedIndex].text, kcal: dur * type.value };
            renderGrid(); closeModals();
            localStorage.setItem('fit_db_v26', JSON.stringify(db));
            await fetch(`${KV_URL}/set/app_data`, { method: 'POST', headers: { Authorization: `Bearer ${KV_TOKEN}` }, body: JSON.stringify(db) });
        }

        function toggleSpace(a) { document.getElementById('bodyRoot').className = a ? 'space-active' : ''; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

        // 立即执行初始化
        init();
    </script>
</body>
</html>
