<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>合伙空间 V22.9·全功能究极版</title>
    <style>
        :root {
            --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --gray: #8E8E93; --accent: #FF2D55;
            --avatar-cy: linear-gradient(45deg,#FF2D55,#5856D6);
            --avatar-sg: linear-gradient(45deg,#FFD60A,#FF9500);
        }
        body { background: var(--bg); color: #1c1c1e; font-family: -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* 日历主界面 */
        .main-app { position: relative; width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; transition: 0.5s; }
        .space-active .main-app { transform: scale(0.9); opacity: 0.3; filter: blur(10px); }

        /* 热量统计栏 */
        .stats-bar { background: #fff; padding: 20px; border-radius: 25px; margin-bottom: 20px; display: flex; justify-content: space-around; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .stat-item { text-align: center; }
        .stat-item b { display: block; font-size: 1.4rem; color: var(--primary); }
        .stat-item span { font-size: 0.7rem; color: var(--gray); font-weight: bold; }

        /* 日历格子 */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; flex: 1; overflow-y: auto; padding-bottom: 80px; scrollbar-width: none; }
        .day { background: var(--card); aspect-ratio: 1; border-radius: 18px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.03); transition: 0.3s; }
        .day b { font-size: 1.1rem; }
        .day small { font-size: 0.6rem; margin-top: 4px; opacity: 0.8; font-weight: bold; }
        .day.fit { background: var(--primary); color: #fff; }
        .day.rest { background: #E5E5EA; color: #8E8E93; }

        /* 留言板抽屉（小引子） */
        .msg-drawer { position: fixed; right: -320px; top: 0; width: 320px; height: 100%; background: var(--card); z-index: 2000; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
        .msg-drawer.open { right: 0; }
        .drawer-handle { position: absolute; left: -45px; top: 50%; transform: translateY(-50%); width: 45px; height: 100px; background: var(--card); border-radius: 20px 0 0 20px; display: flex; justify-content: center; align-items: center; box-shadow: -5px 0 15px rgba(0,0,0,0.05); cursor: pointer; color: var(--primary); font-size: 1.2rem; }
        .msg-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-item { background: #F2F2F7; padding: 12px 16px; border-radius: 15px; font-size: 0.85rem; }

        /* 空间互动层 */
        .space-overlay { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #fff; z-index: 3000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .space-active .space-overlay { left: 0; }
        .ins-feed { flex: 1; overflow-y: auto; background: #FAFAFA; padding-bottom: 100px; }
        .ins-post { background: #fff; margin-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
        .post-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .post-actions { padding: 12px 15px; display: flex; gap: 20px; font-size: 1.5rem; }

        /* 弹窗与按钮 */
        .modal { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 5000; }
        .modal-content { background: #fff; padding: 25px; border-radius: 30px; width: 80%; max-width: 320px; }
        .btn-opt { width: 100%; padding: 15px; border-radius: 15px; border: none; margin-bottom: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .space-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 16px 35px; border-radius: 30px; font-weight: 800; box-shadow: 0 10px 20px rgba(255,45,85,0.3); z-index: 1000; cursor: pointer; }
        .fab { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; background: var(--primary); border-radius: 30px; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 2rem; z-index: 3500; cursor: pointer; }

        /* 评论区 */
        .comment-drawer { position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%; background: #fff; z-index: 6000; border-radius: 30px 30px 0 0; transition: 0.4s; display: flex; flex-direction: column; }
        .comment-drawer.active { bottom: 0; }
    </style>
</head>
<body>

    <div class="main-app">
        <div class="stats-bar">
            <div class="stat-item"><span id="monthText">3月</span><span>训练天数</span><b id="fitCount">0</b></div>
            <div class="stat-item"><span>累计消耗热量</span><b id="totalKcal">0</b><span>Kcal</span></div>
        </div>
        <div id="syncStatus" style="font-size:10px; color:var(--gray); text-align:center; margin-bottom:10px; font-weight:bold;">🔄 正在连接云端...</div>
        <div class="grid" id="grid"></div>
        <div class="space-btn" onclick="toggleSpace(true)">✨ 进入合伙空间</div>
    </div>

    <div class="msg-drawer" id="msgDrawer">
        <div class="drawer-handle" onclick="toggleDrawer()">💬</div>
        <div style="padding:25px; border-bottom:1px solid #f0f0f0;"><h3 style="margin:0;">留言板</h3></div>
        <div class="msg-list" id="msgList"></div>
        <div style="padding:20px; border-top:1px solid #eee;">
            <input type="text" id="msgIn" placeholder="写点什么..." onkeypress="if(event.keyCode==13) sendMsg()" style="width:100%; padding:14px; border-radius:15px; border:none; background:#F2F2F7; outline:none; box-sizing:border-box;">
        </div>
    </div>

    <div class="modal" id="fitModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0; text-align:center;">打卡记录</h3>
            <button class="btn-opt" style="background:var(--primary); color:#fff;" onclick="setDayMode('fit')">🔥 我训练了 (500kcal)</button>
            <button class="btn-opt" style="background:#E5E5EA; color:#8E8E93;" onclick="setDayMode('rest')">☕ 休息日</button>
            <button class="btn-opt" style="background:none; color:var(--accent);" onclick="setDayMode('')">❌ 取消记录</button>
            <button onclick="closeModals()" style="width:100%; border:none; background:none; color:var(--gray); margin-top:5px;">关闭</button>
        </div>
    </div>

    <div class="space-overlay">
        <div style="padding: 60px 20px 15px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee;">
            <b onclick="toggleSpace(false)" style="color:var(--primary); cursor:pointer;">← 返回日历</b>
            <b style="font-size:1.1rem;">合伙动态</b>
            <div style="width:40px;"></div>
        </div>
        <div id="insFeed" class="ins-feed"></div>
        <div class="fab" onclick="openModal('postModal')">+</div>
    </div>

    <div class="modal" id="postModal">
        <div class="modal-content">
            <h3 style="margin-top:0;">发布瞬间</h3>
            <select id="pubRole" style="width:100%; padding:12px; border-radius:12px; border:none; background:#f2f2f7; margin-bottom:15px;">
                <option value="cy">👩‍🎨 林晨羽</option><option value="sg">🤴 大帅哥</option>
            </select>
            <input type="file" id="postFile" accept="image/*" style="margin-bottom:15px; width:100%;">
            <textarea id="postText" placeholder="此刻的心情..." style="width:100%; height:80px; border-radius:15px; border:none; background:#f2f2f7; padding:12px; margin-bottom:15px; outline:none; box-sizing:border-box;"></textarea>
            <button class="btn-opt" style="background:var(--primary); color:#fff; margin-bottom:0;" onclick="handlePublish()">立即发布</button>
            <button onclick="closeModals()" style="width:100%; border:none; background:none; color:var(--gray); margin-top:10px;">取消</button>
        </div>
    </div>

    <div class="comment-drawer" id="commentDrawer">
        <div style="padding:20px; text-align:center; border-bottom:1px solid #f0f0f0; font-weight:bold;">评论 <span style="float:right; color:var(--gray);" onclick="closeComment()">关闭</span></div>
        <div id="commentList" style="flex:1; overflow-y:auto; padding:20px;"></div>
        <div style="padding:20px 20px 40px; border-top:1px solid #eee; display:flex; gap:10px;">
            <input type="text" id="comIn" placeholder="留个言..." style="flex:1; padding:12px; border-radius:12px; border:none; background:#F2F2F7; outline:none;">
            <button onclick="addComment()" style="background:var(--primary); color:#fff; border:none; padding:0 20px; border-radius:12px; font-weight:bold;">送</button>
        </div>
    </div>

    <script>
        const KV_URL = "https://pleasing-hare-88101.upstash.io";
        const KV_TOKEN = "gQAAAAAAAVglAAIncDJiZmE2Mjk5YWZkZTY0YTBmYTBlowU0YWI0NmJiMzUwNHAyODgxMDE";
        
        let db = { calendar: Array.from({length:12}, () => ({})), messages: [], posts: [] };
        let curDay = null; let activePostId = null;

        async function load() {
            try {
                const res = await fetch(`${KV_URL}/get/app_data`, { headers: { Authorization: `Bearer ${KV_TOKEN}` } });
                const r = await res.json();
                if(r.result) {
                    let d = r.result;
                    while(typeof d === 'string') { try { d = JSON.parse(d); } catch(e){break;} }
                    db = d; updateUI();
                    document.getElementById('syncStatus').innerText = "✅ 数据同步成功";
                }
            } catch(e) { document.getElementById('syncStatus').innerText = "⚠️ 离线模式"; }
        }

        async function save() {
            document.getElementById('syncStatus').innerText = "⏳ 正在同步...";
            try {
                await fetch(`${KV_URL}/set/app_data`, {
                    method: 'POST', headers: { Authorization: `Bearer ${KV_TOKEN}` },
                    body: JSON.stringify(db)
                });
                document.getElementById('syncStatus').innerText = "✅ 同步成功";
            } catch(e) { document.getElementById('syncStatus').innerText = "⚠️ 同步失败"; }
        }

        function updateUI() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            const m = new Date().getMonth();
            const days = new Date(2026, m+1, 0).getDate();
            let fits = 0;

            for(let i=1; i<=days; i++) {
                const mode = db.calendar[m][i]?.mode || '';
                if(mode === 'fit') fits++;
                const node = document.createElement('div');
                node.className = `day ${mode}`;
                node.innerHTML = `<b>${i}</b><small>${mode==='fit'?'FIT':mode==='rest'?'REST':''}</small>`;
                node.onclick = () => { curDay = i; openModal('fitModal'); document.getElementById('modalTitle').innerText = `${m+1}月${i}日打卡`; };
                grid.appendChild(node);
            }
            
            document.getElementById('fitCount').innerText = fits;
            document.getElementById('totalKcal').innerText = fits * 500;
            document.getElementById('msgList').innerHTML = db.messages.map(m => `<div class="msg-item">${m}</div>`).join('');
            document.getElementById('msgList').scrollTop = document.getElementById('msgList').scrollHeight;
        }

        function setDayMode(m) {
            db.calendar[new Date().getMonth()][curDay] = { mode: m };
            closeModals(); updateUI(); save();
        }

        function sendMsg() {
            const input = document.getElementById('msgIn'); if(!input.value) return;
            const anis = ["🐽 小猪", "🐶 小狗", "🐱 小猫", "🐰 兔兔", "🐨 考拉", "🐼 熊猫"];
            const name = anis[Math.floor(Math.random() * anis.length)];
            db.messages.push(`<b>[${name}]</b>: ${input.value}`);
            if(db.messages.length > 30) db.messages.shift();
            input.value = ''; updateUI(); save();
        }

        function handlePublish() {
            const file = document.getElementById('postFile').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d');
                    const MAX = 640; let w = img.width, h = img.height;
                    if(w > MAX) { h *= MAX/w; w = MAX; }
                    cvs.width = w; cvs.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    db.posts.unshift({
                        id: Date.now(), role: document.getElementById('pubRole').value,
                        img: cvs.toDataURL('image/jpeg', 0.6),
                        text: document.getElementById('postText').value,
                        likes: 0, comments: []
                    });
                    closeModals(); renderFeed(); save();
                };
            };
            reader.readAsDataURL(file);
        }

        function renderFeed() {
            document.getElementById('insFeed').innerHTML = db.posts.map(p => `
                <div class="ins-post">
                    <div style="padding:15px; font-weight:800; display:flex; gap:10px; align-items:center;">
                        <div class="avatar" style="width:30px; height:30px; border-radius:50%; background:${p.role==='cy'?'var(--avatar-cy)':'var(--avatar-sg)'}; color:#fff; display:flex; justify-content:center; align-items:center; font-size:10px;">${p.role==='cy'?'羽':'帅'}</div>
                        ${p.role==='cy'?'林晨羽':'大帅哥'}
                    </div>
                    <img src="${p.img}" class="post-img">
                    <div class="post-actions">
                        <span onclick="doLike(${p.id})">❤️ <small style="font-size:12px;">${p.likes||0}</small></span>
                        <span onclick="openComment(${p.id})">💬 <small style="font-size:12px;">${p.comments?.length||0}</small></span>
                    </div>
                    <div style="padding:0 15px 15px; font-size:14px;"><b>${p.role==='cy'?'羽':'帅'}:</b> ${p.text}</div>
                </div>`).join('');
        }

        function doLike(id) {
            db.posts = db.posts.map(p => p.id === id ? {...p, likes: (p.likes||0)+1} : p);
            renderFeed(); save();
        }

        function openComment(id) {
            activePostId = id;
            const post = db.posts.find(p => p.id === id);
            document.getElementById('commentList').innerHTML = (post.comments || []).map(c => `<div style="margin-bottom:10px; font-size:0.9rem;"><b>合伙人:</b> ${c}</div>`).join('');
            document.getElementById('commentDrawer').classList.add('active');
        }

        function addComment() {
            const val = document.getElementById('comIn').value; if(!val) return;
            db.posts = db.posts.map(p => {
                if(p.id === activePostId) { p.comments = p.comments || []; p.comments.push(val); }
                return p;
            });
            document.getElementById('comIn').value = ''; openComment(activePostId); renderFeed(); save();
        }

        function toggleDrawer() { document.getElementById('msgDrawer').classList.toggle('open'); }
        function toggleSpace(a) { document.body.classList.toggle('space-active', a); if(a) renderFeed(); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function closeComment() { document.getElementById('commentDrawer').classList.remove('active'); }

        window.onload = load;
    </script>
</body>
</html>
