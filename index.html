<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>合伙空间 V22.6·狂欢动物园版</title>
    <style>
        :root {
            --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --gray: #8E8E93; --accent: #FF2D55;
            --avatar-cy: linear-gradient(45deg,#FF2D55,#5856D6);
            --avatar-sg: linear-gradient(45deg,#FFD60A,#FF9500);
        }
        body { background: var(--bg); color: #1c1c1e; font-family: -apple-system, "PingFang SC", sans-serif; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* 布局 */
        .main-app { display: flex; width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; gap: 20px; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .space-active .main-app { transform: translateX(-40%); opacity: 0.3; }

        .calendar-section { flex: 1.6; display: flex; flex-direction: column; min-width: 0; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; overflow-y: auto; flex: 1; padding-bottom: 20px; scrollbar-width: none; }
        .day { background: var(--card); aspect-ratio: 1; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.3s; }
        .day:active { transform: scale(0.9); }
        .day.fit { background: var(--primary); color: #fff; }

        /* 侧边留言板 */
        .sidebar { flex: 1; background: var(--card); border-radius: 35px; display: flex; flex-direction: column; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        #syncStatus { font-size: 11px; color: var(--gray); text-align: center; margin-bottom: 12px; font-weight: bold; letter-spacing: 1px; }
        .space-trigger { background: linear-gradient(135deg, #FF2D55, #AF52DE, #5856D6); color: white; padding: 18px; border-radius: 22px; text-align: center; font-weight: 800; cursor: pointer; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(255,45,85,0.3); }
        
        .msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; scrollbar-width: none; }
        .msg-item { background: #F2F2F7; padding: 12px 16px; border-radius: 18px; font-size: 0.85rem; line-height: 1.5; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 空间动态层 */
        .space-overlay { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #fff; z-index: 3000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .space-active .space-overlay { left: 0; }
        .ins-feed { flex: 1; overflow-y: auto; background: #FAFAFA; padding-bottom: 100px; }
        .ins-post { width: 100%; max-width: 500px; margin: 0 auto 10px; background: #fff; border-bottom: 1px solid #f0f0f0; }
        .post-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .post-actions { padding: 12px 18px; display: flex; gap: 20px; font-size: 1.5rem; }
        .action-btn { cursor: pointer; transition: 0.2s; }
        .action-btn:active { transform: scale(1.2); }

        /* 评论抽屉 */
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%; background: #fff; z-index: 6000; border-radius: 30px 30px 0 0; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; box-shadow: 0 -15px 45px rgba(0,0,0,0.15); }
        .drawer.active { bottom: 0; }
        
        .modal { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); z-index: 5000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 35px; width: 85%; max-width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .btn-main { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--primary); color: #fff; font-weight: 800; cursor: pointer; box-shadow: 0 5px 15px rgba(0,122,255,0.3); }
        
        .fab { position: absolute; bottom: 40px; right: 25px; width: 65px; height: 65px; background: linear-gradient(135deg, var(--primary), #5856D6); border-radius: 35px; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 2rem; z-index: 3100; box-shadow: 0 10px 25px rgba(0,122,255,0.4); cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-app" id="mainApp">
        <div class="calendar-section">
            <div style="font-weight: 900; font-size: 1.8rem; margin-bottom: 20px; letter-spacing: -1px;">训练中心 ⚡️</div>
            <div class="grid" id="grid"></div>
        </div>
        <div class="sidebar">
            <div id="syncStatus">🔄 尝试接入云端...</div>
            <div class="space-trigger" onclick="toggleSpace(true)">✨ 开启合伙动态</div>
            <div class="msg-list" id="msgList"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="msgIn" placeholder="此刻想说..." onkeypress="if(event.keyCode==13) sendMsg()" style="flex:1; padding:16px; border-radius:18px; border:none; background:#F2F2F7; outline:none; font-weight:500;">
                <button onclick="sendMsg()" style="background:var(--primary); color:#fff; border:none; width:50px; border-radius:18px; font-weight:bold;">送</button>
            </div>
        </div>
    </div>

    <div class="space-overlay">
        <div style="padding: 60px 25px 15px; display: flex; justify-content: space-between; align-items:center; border-bottom: 1px solid #f0f0f0;">
            <span onclick="toggleSpace(false)" style="color:var(--primary); font-weight:800; cursor:pointer; font-size:1.1rem;">← 返回</span>
            <span style="font-weight: 900; font-size:1.2rem;">合伙空间</span>
            <span style="width:40px;"></span>
        </div>
        <div class="ins-feed" id="insFeed"></div>
        <div class="fab" onclick="openModal('postModal')">+</div>
    </div>

    <div class="drawer" id="commentDrawer">
        <div style="padding:20px; text-align:center; border-bottom:1px solid #f0f0f0; font-weight:900;">
            全部评论 <span style="position:absolute; right:25px; color:var(--gray); font-size:0.9rem; font-weight:500;" onclick="closeDrawer()">收起</span>
        </div>
        <div id="drawerList" style="flex:1; overflow-y:auto; padding:20px;"></div>
        <div style="padding:20px 20px 45px; border-top:1px solid #f0f0f0; display:flex; gap:10px;">
            <input type="text" id="drawerIn" placeholder="写下你的评论..." style="flex:1; padding:15px; border-radius:15px; border:none; background:#F2F2F7; outline:none;">
            <button onclick="submitComment()" style="background:var(--primary); color:#fff; border:none; padding:0 20px; border-radius:15px; font-weight:800;">发送</button>
        </div>
    </div>

    <div class="modal" id="postModal">
        <div class="modal-content">
            <h3 style="margin:0 0 20px; font-weight:900; font-size:1.4rem;">分享这一刻</h3>
            <select id="pubRole" style="width:100%; padding:15px; border-radius:15px; border:none; background:#f2f2f7; margin-bottom:15px; font-weight:700; appearance:none;">
                <option value="cy">👩‍🎨 林晨羽 (羽)</option><option value="sg">🤴 大帅哥 (帅)</option>
            </select>
            <input type="file" id="postFile" accept="image/*" style="margin-bottom:20px; font-size:0.8rem; width:100%;">
            <textarea id="postText" placeholder="分享今天的训练心得或心情..." style="width:100%; height:100px; border-radius:18px; border:none; background:#f2f2f7; padding:15px; margin-bottom:20px; outline:none; box-sizing:border-box; font-family:inherit;"></textarea>
            <button class="btn-main" onclick="handlePublish()">同步到云端</button>
            <button onclick="closeModals()" style="width:100%; border:none; background:none; color:var(--gray); margin-top:15px; font-weight:600;">下次再说</button>
        </div>
    </div>

    <script>
        const KV_URL = "https://pleasing-hare-88101.upstash.io";
        const KV_TOKEN = "gQAAAAAAAVglAAIncDJiZmE2Mjk5YWZkZTY0YTBmYTBlowU0YWI0NmJiMzUwNHAyODgxMDE";

        let db = { calendar: Array.from({length:12}, () => ({})), messages: [], posts: [] };
        let activePostId = null;

        // --- 核心同步：多层级自动解析 ---
        async function loadFromCloud() {
            try {
                const res = await fetch(`${KV_URL}/get/app_data`, { headers: { Authorization: `Bearer ${KV_TOKEN}` } });
                const result = await res.json();
                if (result && result.result) {
                    let data = result.result;
                    // 自动剥离多层序列化引号
                    while (typeof data === 'string') { try { data = JSON.parse(data); } catch(e){break;} }
                    db = data; updateUI();
                    if(document.body.classList.contains('space-active')) renderFeed();
                    document.getElementById('syncStatus').innerText = "✅ 数据实时在线";
                }
            } catch (e) { document.getElementById('syncStatus').innerText = "⚠️ 离线模式"; }
        }

        async function save() {
            document.getElementById('syncStatus').innerText = "⏳ 正在同步...";
            try {
                await fetch(`${KV_URL}/set/app_data`, {
                    method: 'POST', headers: { Authorization: `Bearer ${KV_TOKEN}` },
                    body: JSON.stringify(db) // 【关键】严禁双重序列化
                });
                document.getElementById('syncStatus').innerText = "✅ 数据实时在线";
            } catch (e) { document.getElementById('syncStatus').innerText = "⚠️ 保存受阻"; }
        }

        // --- 【重点修复】随机动物昵称永久绑定 ---
        function sendMsg() {
            const input = document.getElementById('msgIn'); if(!input.value) return;
            const animals = ["🐽 小猪", "🐶 小狗", "🐱 小猫", "🐰 兔兔", "🐨 考拉", "🐼 熊猫", "🦊 狐狸", "🦁 狮子", "🐵 猴子"];
            const randomName = animals[Math.floor(Math.random() * animals.length)];
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            // 将随机名直接存入数据库，这样加载时就不会变了
            db.messages.push(`<b>[${randomName}]</b> <small>${time}</small><br>${input.value}`);
            if(db.messages.length > 25) db.messages.shift();
            input.value = ''; updateUI(); save();
        }

        // --- 互动功能 ---
        function handleLike(id) {
            db.posts = db.posts.map(p => p.id === id ? {...p, likes: (p.likes || 0) + 1} : p);
            renderFeed(); save();
        }

        function openComments(id) {
            activePostId = id;
            const post = db.posts.find(p => p.id === id);
            document.getElementById('drawerList').innerHTML = (post.comments || []).map(c => 
                `<div style="margin-bottom:15px; font-size:0.9rem; background:#f9f9f9; padding:10px; border-radius:12px;"><b>合伙人:</b> ${c.txt}</div>`).join('');
            document.getElementById('commentDrawer').classList.add('active');
        }

        function submitComment() {
            const txt = document.getElementById('drawerIn').value; if(!txt) return;
            db.posts = db.posts.map(p => {
                if(p.id === activePostId) {
                    const c = p.comments || [];
                    c.push({ user: "合伙人", txt });
                    return {...p, comments: c};
                }
                return p;
            });
            document.getElementById('drawerIn').value = ''; openComments(activePostId); renderFeed(); save();
        }

        // --- 图片压缩算法 ---
        function handlePublish() {
            const file = document.getElementById('postFile').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX = 640; let w = img.width, h = img.height;
                    if(w > MAX) { h *= MAX/w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    db.posts.unshift({
                        id: Date.now(), role: document.getElementById('pubRole').value,
                        img: canvas.toDataURL('image/jpeg', 0.6), // 0.6 压缩率
                        text: document.getElementById('postText').value,
                        likes: 0, comments: []
                    });
                    closeModals(); renderFeed(); save();
                }
            };
            reader.readAsDataURL(file);
        }

        function renderFeed() {
            document.getElementById('insFeed').innerHTML = db.posts.map(p => `
                <div class="ins-post">
                    <div style="padding:15px; display:flex; align-items:center; gap:12px;">
                        <div class="avatar ${p.role==='cy'?'avatar-cy':'avatar-sg'}" style="width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:900;">${p.role==='cy'?'羽':'帅'}</div>
                        <span style="font-weight:800; font-size:14px;">${p.role==='cy'?'林晨羽':'大帅哥'}</span>
                    </div>
                    <img src="${p.img}" class="post-img">
                    <div class="post-actions">
                        <span class="action-btn" onclick="handleLike(${p.id})">❤️ <small style="font-size:12px; vertical-align:middle;">${p.likes||0}</small></span>
                        <span class="action-btn" onclick="openComments(${p.id})">💬 <small style="font-size:12px; vertical-align:middle;">${p.comments?.length||0}</small></span>
                    </div>
                    <div style="padding:0 18px 20px; font-size:14px; line-height:1.4;"><b>${p.role==='cy'?'羽':'帅'}:</b> ${p.text}</div>
                </div>`).join('');
        }

        function updateUI() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            const m = new Date().getMonth();
            const days = new Date(2026, m + 1, 0).getDate();
            for(let i=1; i<=days; i++) {
                const node = document.createElement('div');
                node.className = `day ${db.calendar[m][i]?.mode || ''}`;
                node.innerHTML = `<b style="font-size:1.1rem;">${i}</b>`;
                grid.appendChild(node);
            }
            document.getElementById('msgList').innerHTML = db.messages.map(m => `<div class="msg-item">${m}</div>`).join('');
            document.getElementById('msgList').scrollTop = document.getElementById('msgList').scrollHeight;
        }

        function toggleSpace(a) { document.body.classList.toggle('space-active', a); if(a) renderFeed(); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function closeDrawer() { document.getElementById('commentDrawer').classList.remove('active'); }

        window.onload = () => { loadFromCloud(); updateUI(); };
    </script>
</body>
</html>
