<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>合伙空间 V20</title>
    <style>
        :root {
            --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --gray: #8E8E93; --accent: #FF2D55;
            --avatar-cy: linear-gradient(45deg,#FF2D55,#5856D6);
            --avatar-sg: linear-gradient(45deg,#FFD60A,#FF9500);
        }

        body {
            background-color: var(--bg); color: #1c1c1e;
            font-family: -apple-system, "PingFang SC", sans-serif;
            margin: 0; padding: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }

        /* 主界面布局 */
        .main-app { display: flex; width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; gap: 20px; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .space-active .main-app { transform: translateX(-40%); opacity: 0.3; pointer-events: none; }

        /* 日历区 */
        .calendar-section { flex: 1.6; display: flex; flex-direction: column; min-width: 0; }
        .month-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .month-scroll::-webkit-scrollbar { display: none; }
        .m-item { padding: 8px 16px; border-radius: 12px; background: #E5E5EA; color: var(--gray); font-size: 0.85rem; font-weight: 600; white-space: nowrap; transition: 0.3s; }
        .m-item.active { background: var(--primary); color: #fff; transform: scale(1.05); }

        .stat-banner { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--card); padding: 12px; border-radius: 18px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .stat-num { font-size: 1.2rem; font-weight: 800; color: var(--primary); display: block; }
        .stat-label { font-size: 0.6rem; color: var(--gray); margin-top: 4px; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; overflow-y: auto; flex: 1; padding-bottom: 20px; scrollbar-width: none; }
        .day { background: var(--card); aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        .day.fit { background: var(--primary); color: #fff; box-shadow: 0 4px 8px rgba(0,122,255,0.3); }
        .day.rest { background: #E5E5EA; opacity: 0.6; }
        .d-num { font-size: 0.9rem; font-weight: 700; }
        .d-kcal { font-size: 0.5rem; margin-top: 2px; }

        /* 侧边栏：碎碎念 */
        .sidebar { flex: 1; background: var(--card); border-radius: 30px; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .space-trigger { background: linear-gradient(135deg, #FF2D55, #AF52DE, #5856D6); color: white; padding: 18px; border-radius: 20px; text-align: center; font-weight: 800; cursor: pointer; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(175,82,222,0.3); }
        .msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; scrollbar-width: none; }
        .msg-item { background: #F2F2F7; padding: 10px 14px; border-radius: 15px; font-size: 0.8rem; line-height: 1.4; }
        .msg-item b { color: var(--primary); margin-right: 5px; }

        /* 空间层 (合伙动态) */
        .space-overlay { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #fff; z-index: 3000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .space-active .space-overlay { left: 0; }
        .space-header { padding: 50px 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #f0f0f0; background: #fff; }

        .ins-feed { flex: 1; overflow-y: auto; background: #FAFAFA; scrollbar-width: none; padding-bottom: 100px; }
        .ins-post { width: 100%; max-width: 500px; margin: 0 auto 15px; background: #fff; border-bottom: 1px solid #f0f0f0; }
        .post-header { padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.7rem; font-weight: bold; }
        .avatar-cy { background: var(--avatar-cy); }
        .avatar-sg { background: var(--avatar-sg); }
        
        .post-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #eee; }
        .post-actions { padding: 10px 15px; display: flex; align-items: center; gap: 18px; }
        .action-icon { font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .action-icon:active { transform: scale(1.2); }
        
        .comments-box { padding: 0 15px 15px; border-top: 1px solid #fbfbfb; }
        .comment-item { font-size: 0.8rem; margin-top: 6px; line-height: 1.4; }
        .comment-item b { color: var(--primary); }

        /* 弹窗适配 */
        .modal { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); z-index: 5000; }
        .modal-content { background: #fff; padding: 25px; border-radius: 30px; width: 85%; max-width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        
        .input-group { position: relative; width: 100%; margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 15px 60px 15px 15px; border-radius: 12px; border: none; background: #F2F2F7; font-size: 1rem; box-sizing: border-box; outline: none; }
        .input-group::after { content: attr(data-unit); position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--gray); font-size: 0.8rem; font-weight: bold; pointer-events: none; }

        .btn-main { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; font-size: 1rem; }
        
        /* 加号按钮（仅在空间显示） */
        .fab { position: absolute; bottom: 40px; right: 25px; width: 65px; height: 65px; background: linear-gradient(135deg, var(--primary), #5856D6); border-radius: 35px; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 2rem; box-shadow: 0 10px 25px rgba(0,122,255,0.4); z-index: 3100; cursor: pointer; }

        @media (max-width: 768px) { .main-app { flex-direction: column; overflow-y: auto; } .sidebar { flex: none; min-height: 400px; margin-bottom: 20px; } }
    </style>
</head>
<body>

    <div class="main-app" id="mainApp">
        <div class="calendar-section">
            <div class="month-scroll" id="monthBar"></div>
            <div style="font-weight: 900; font-size: 1.6rem; margin: 10px 0 15px; letter-spacing: -1px;">训练中心 ⚡️</div>
            <div class="stat-banner">
                <div class="stat-card"><span class="stat-num" id="t-count">0</span><span class="stat-label">累计训练</span></div>
                <div class="stat-card"><span class="stat-num" id="m-kcal">0</span><span class="stat-label">本月消耗</span></div>
                <div class="stat-card"><span class="stat-num" id="y-kcal">0</span><span class="stat-label">年度目标</span></div>
            </div>
            <div class="grid" id="grid"></div>
        </div>

        <div class="sidebar">
            <div class="space-trigger" onclick="toggleSpace(true)">✨ 进入合伙空间</div>
            <div style="font-weight: 800; margin-bottom: 12px; font-size: 0.9rem; color: var(--gray);">碎碎念</div>
            <div class="msg-list" id="msgList"></div>
            <input type="text" id="msgIn" placeholder="写句骚话..." onkeypress="if(event.keyCode==13) sendMsg()" style="width:100%; padding:14px; border-radius:15px; border:none; background:#F2F2F7; font-size:0.9rem; outline:none;">
        </div>
    </div>

    <div class="space-overlay">
        <div class="space-header">
            <span onclick="toggleSpace(false)" style="color:var(--primary); font-weight:700; font-size:1rem; cursor:pointer;">← 返回</span>
            <span style="font-weight: 900; font-size:1.1rem;">合伙动态</span>
            <span style="width: 40px;"></span>
        </div>
        <div class="ins-feed" id="insFeed"></div>
        <div class="fab" onclick="openModal('postModal')">+</div>
    </div>

    <div class="modal" id="fitModal">
        <div class="modal-content">
            <h3 id="fitDateTitle" style="margin-top:0; font-weight:900;">打卡记录</h3>
            <select id="fitMode" style="width:100%; padding:14px; border-radius:12px; border:none; background:#F2F2F7; margin-bottom:15px; font-size:1rem;">
                <option value="fit">🔥 今日训练</option><option value="rest">☕ 休息一下</option>
            </select>
            <div id="fitDetail">
                <select id="fitType" style="width:100%; padding:14px; border-radius:12px; border:none; background:#F2F2F7; margin-bottom:15px; font-size:1rem;">
                    <option value="9.5">🏃 强力跑步</option><option value="7.5">🧗 坡度走</option><option value="12">🏋️ 力量训练</option>
                </select>
                <div class="input-group" data-unit="分钟">
                    <input type="number" id="fitMin" value="45" inputmode="numeric">
                </div>
            </div>
            <button class="btn-main" onclick="saveFit()">保存打卡数据</button>
            <button onclick="closeModals()" style="width:100%; border:none; background:none; color:var(--gray); margin-top:15px; font-weight:600;">取消</button>
        </div>
    </div>

    <div class="modal" id="postModal">
        <div class="modal-content">
            <h3 style="margin-top:0; font-weight:900;">发布瞬间</h3>
            <select id="pubRole" style="width:100%; padding:14px; border-radius:12px; border:none; background:#F2F2F7; margin-bottom:15px; font-size:1rem;">
                <option value="cy">林晨羽</option><option value="sg">大帅哥</option>
            </select>
            <input type="file" id="postFile" accept="image/*" style="margin-bottom:15px; font-size:0.8rem; width:100%;">
            <textarea id="postText" placeholder="这一刻的想法..." style="width:100%; height:80px; border-radius:15px; border:none; background:#f2f2f7; padding:12px; margin-bottom:15px; font-size:0.9rem; outline:none; box-sizing:border-box;"></textarea>
            <button class="btn-main" id="pubBtn" onclick="handlePublish()">立即发布</button>
            <button onclick="closeModals()" style="width:100%; border:none; background:none; color:var(--gray); margin-top:15px; font-weight:600;">取消</button>
        </div>
    </div>

    <script>
        const storageKey = 'fit_v20_pro';
        // 随机昵称池
        const nicks = ["酷炫小猪", "健身小狗", "举铁袋鼠", "早起海豹", "干饭熊猫", "跑步飞鸟", "懒散河马", "深蹲考拉"];
        
        let db = JSON.parse(localStorage.getItem(storageKey)) || { calendar: Array.from({length:12}, () => ({})), messages: [], posts: [] };
        let curM = new Date().getMonth(), curD = 1;

        function save() { 
            try {
                localStorage.setItem(storageKey, JSON.stringify(db)); 
            } catch(e) {
                alert("存储空间不足，请尝试删除一些动态！");
            }
        }
        
        function getRandomNick() { return nicks[Math.floor(Math.random() * nicks.length)]; }
        function toggleSpace(a) { document.body.classList.toggle('space-active', a); if(a) renderFeed(); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

        // 初始化日历
        function initCalendar() {
            const mb = document.getElementById('monthBar'); mb.innerHTML = '';
            ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"].forEach((m, i) => {
                const d = document.createElement('div'); d.className = `m-item ${i===curM?'active':''}`; d.innerText = m;
                d.onclick = () => { curM = i; initCalendar(); updateUI(); }; mb.appendChild(d);
            });
            updateUI();
        }

        function updateUI() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            const daysInMonth = new Date(2026, curM + 1, 0).getDate();
            let mK = 0, tD = 0, yK = 0;
            
            db.calendar.forEach((mo, mi) => Object.values(mo).forEach(d => { 
                if(d.mode==='fit'){ if(mi===curM)mK+=d.kcal; yK+=d.kcal; tD++; } 
            }));

            for(let i=1; i<=daysInMonth; i++) {
                const data = db.calendar[curM][i] || {mode:''};
                const node = document.createElement('div'); node.className = `day ${data.mode}`;
                node.innerHTML = `<span class="d-num">${i}</span>${data.kcal?`<span class="d-kcal">-${Math.round(data.kcal)}</span>`:''}`;
                node.onclick = () => { curD = i; document.getElementById('fitDateTitle').innerText = `${curM+1}月${i}日`; openModal('fitModal'); };
                grid.appendChild(node);
            }
            document.getElementById('t-count').innerText = tD;
            document.getElementById('m-kcal').innerText = Math.round(mK);
            document.getElementById('y-kcal').innerText = Math.round(yK);
            document.getElementById('msgList').innerHTML = db.messages.map(m => `<div class="msg-item">${m}</div>`).join('');
        }

        function saveFit() {
            const mode = document.getElementById('fitMode').value;
            const kcal = mode === 'fit' ? (parseFloat(document.getElementById('fitType').value) * 70 * (parseInt(document.getElementById('fitMin').value)/60)) : 0;
            db.calendar[curM][curD] = { mode, kcal };
            save(); closeModals(); updateUI();
        }

        // 核心优化：带压缩的发布功能
        function handlePublish() {
            const file = document.getElementById('postFile').files[0];
            const text = document.getElementById('postText').value;
            const role = document.getElementById('pubRole').value;
            if(!file) return alert("选张照片呀~");

            const btn = document.getElementById('pubBtn');
            btn.innerText = "处理压缩中...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; // 限制宽度防止爆存储
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7); // 70%质量
                    
                    db.posts.unshift({
                        id: Date.now(), role, img: compressedBase64, text: text.trim(), 
                        likes: 0, comments: [], 
                        time: new Date().toLocaleString([], {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})
                    });
                    
                    save(); 
                    btn.innerText = "立即发布"; btn.disabled = false;
                    closeModals(); renderFeed();
                };
            };
            reader.readAsDataURL(file);
        }

        function renderFeed() {
            const feed = document.getElementById('insFeed');
            feed.innerHTML = db.posts.map(p => `
                <div class="ins-post">
                    <div class="post-header">
                        <div class="avatar ${p.role==='cy'?'avatar-cy':'avatar-sg'}">${p.role==='cy'?'晨羽':'帅哥'}</div>
                        <div style="font-weight:700; font-size:0.9rem;">${p.role==='cy'?'林晨羽':'大帅哥'} <span style="font-weight:400; color:#8e8e93; font-size:0.6rem; margin-left:5px;">${p.time}</span></div>
                    </div>
                    <img src="${p.img}" class="post-img">
                    <div class="post-actions">
                        <span class="action-icon" onclick="like(${p.id})">${p.likes>0?'❤️':'🤍'}</span>
                        <span class="action-icon" onclick="addComment(${p.id})">💬</span>
                        <span style="font-size:0.8rem; font-weight:800; margin-left:auto; color:var(--gray);">${p.likes} 次赞</span>
                    </div>
                    <div class="comments-box">
                        ${p.text ? `<div class="comment-item"><b>${p.role==='cy'?'晨羽':'帅哥'}:</b> ${p.text}</div>` : ''}
                        ${(p.comments || []).map(c => `<div class="comment-item"><b>${c.user}:</b> ${c.txt}</div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function like(id) {
            db.posts = db.posts.map(p => p.id===id?{...p, likes:p.likes+1}:p);
            save(); renderFeed();
        }

        function addComment(id) {
            const txt = prompt("想对他说点什么?");
            if(!txt) return;
            db.posts = db.posts.map(p => {
                if(p.id === id) {
                    const c = p.comments || [];
                    c.push({ user: getRandomNick(), txt });
                    return {...p, comments: c};
                }
                return p;
            });
            save(); renderFeed();
        }

        function sendMsg() {
            const i = document.getElementById('msgIn'); if(!i.value) return;
            db.messages.push(`<b>${getRandomNick()}</b>: ${i.value}`); 
            if(db.messages.length>25) db.messages.shift();
            save(); i.value=''; updateUI();
        }

        initCalendar();
    </script>
</body>
</html>
