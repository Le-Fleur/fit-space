<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>合伙空间 V22.3·终极云端版</title>
    <style>
        :root {
            --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --gray: #8E8E93; --accent: #FF2D55;
            --avatar-cy: linear-gradient(45deg,#FF2D55,#5856D6);
            --avatar-sg: linear-gradient(45deg,#FFD60A,#FF9500);
        }

        body {
            background-color: var(--bg); color: #1c1c1e;
            font-family: -apple-system, "PingFang SC", sans-serif;
            margin: 0; padding: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden;
        }

        /* 主界面布局 */
        .main-app { display: flex; width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; gap: 20px; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .space-active .main-app { transform: translateX(-40%); opacity: 0.3; }

        .calendar-section { flex: 1.6; display: flex; flex-direction: column; min-width: 0; }
        .month-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .month-scroll::-webkit-scrollbar { display: none; }
        .m-item { padding: 8px 16px; border-radius: 12px; background: #E5E5EA; color: var(--gray); font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
        .m-item.active { background: var(--primary); color: #fff; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; overflow-y: auto; flex: 1; padding-bottom: 20px; scrollbar-width: none; }
        .day { background: var(--card); aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; position: relative; transition: 0.3s; }
        .day.fit { background: var(--primary); color: #fff; }
        .day.rest { opacity: 0.4; background: #D1D1D6; filter: grayscale(1); } /* 休息变灰 */

        /* 侧边栏 */
        .sidebar { flex: 1; background: var(--card); border-radius: 30px; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        #syncStatus { font-size: 11px; color: var(--gray); text-align: center; margin-bottom: 10px; font-weight: bold; }
        .space-trigger { background: linear-gradient(135deg, #FF2D55, #AF52DE, #5856D6); color: white; padding: 18px; border-radius: 20px; text-align: center; font-weight: 800; cursor: pointer; margin-bottom: 20px; }
        
        .msg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; scrollbar-width: none; }
        .msg-item { background: #F2F2F7; padding: 10px 14px; border-radius: 15px; font-size: 0.8rem; }

        /* 空间层与 Ins Feed */
        .space-overlay { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: #fff; z-index: 3000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .space-active .space-overlay { left: 0; }
        .space-header { padding: 50px 20px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #eee; }

        .ins-feed { flex: 1; overflow-y: auto; background: #FAFAFA; scrollbar-width: none; padding-bottom: 100px; }
        .ins-post { width: 100%; max-width: 500px; margin: 0 auto; background: #fff; border-bottom: 1px solid #f0f0f0; }
        .post-header { padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.7rem; font-weight: bold; }
        .avatar-cy { background: var(--avatar-cy); }
        .avatar-sg { background: var(--avatar-sg); }
        .post-img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .post-actions { padding: 10px 15px; display: flex; align-items: center; gap: 15px; }
        .action-icon { font-size: 1.4rem; cursor: pointer; }

        /* 评论抽屉 */
        .comment-drawer { position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%; background: #fff; z-index: 6000; border-radius: 25px 25px 0 0; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }
        .comment-drawer.active { bottom: 0; }
        .drawer-header { padding: 15px; text-align: center; border-bottom: 1px solid #f0f0f0; font-weight: 800; position: relative; }
        .drawer-close { position: absolute; right: 20px; top: 15px; color: var(--gray); font-size: 0.9rem; }
        .drawer-list { flex: 1; overflow-y: auto; padding: 15px; }
        .drawer-input-area { padding: 15px 15px 40px; border-top: 1px solid #f0f0f0; background: #fff; }
        .emoji-bar { display: flex; gap: 12px; margin-bottom: 10px; font-size: 1.4rem; overflow-x: auto; }

        /* 弹窗 */
        .modal { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); z-index: 5000; }
        .modal-content { background: #fff; padding: 25px; border-radius: 30px; width: 85%; max-width: 320px; }
        .btn-main { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
        .btn-ghost { width: 100%; padding: 12px; border: none; background: none; color: var(--accent); font-weight: 600; cursor: pointer; }
        
        .fab { position: absolute; bottom: 30px; right: 20px; width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary), #5856D6); border-radius: 30px; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 1.8rem; box-shadow: 0 8px 20px rgba(0,122,255,0.3); z-index: 3100; }

        @media (max-width: 768px) { .main-app { flex-direction: column; overflow-y: auto; } .sidebar { flex: none; min-height: 350px; } }
    </style>
</head>
<body>

    <div class="main-app" id="mainApp">
        <div class="calendar-section">
            <div class="month-scroll" id="monthBar"></div>
            <div style="font-weight: 900; font-size: 1.5rem; margin: 10px 0 15px;">训练中心 ⚡️</div>
            <div class="grid" id="grid"></div>
        </div>
        <div class="sidebar">
            <div id="syncStatus">🔄 正在连接云端...</div>
            <div class="space-trigger" onclick="toggleSpace(true)">✨ 进入合伙空间</div>
            <div class="msg-list" id="msgList"></div>
            <input type="text" id="msgIn" placeholder="写句骚话..." onkeypress="if(event.keyCode==13) sendMsg()" style="width:100%; padding:14px; border-radius:15px; border:none; background:#F2F2F7; outline:none;">
        </div>
    </div>

    <div class="space-overlay">
        <div class="space-header">
            <span onclick="toggleSpace(false)" style="color:var(--primary); font-weight:700;">← 返回</span>
            <span style="font-weight: 900;">合伙动态</span>
            <span style="width: 40px;"></span>
        </div>
        <div class="ins-feed" id="insFeed"></div>
        <div class="fab" onclick="openModal('postModal')">+</div>
    </div>

    <div class="comment-drawer" id="commentDrawer">
        <div class="drawer-header">
            评论 <span class="drawer-close" onclick="closeDrawer()">关闭</span>
        </div>
        <div class="drawer-list" id="drawerList"></div>
        <div class="drawer-input-area">
            <div class="emoji-bar">
                <span onclick="addEmoji('🔥')">🔥</span><span onclick="addEmoji('👏')">👏</span><span onclick="addEmoji('❤️')">❤️</span><span onclick="addEmoji('💪')">💪</span><span onclick="addEmoji('😂')">😂</span>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="drawerIn" placeholder="添加评论..." style="flex:1; padding:12px; border-radius:12px; border:none; background:#F2F2F7; outline:none;">
                <button onclick="submitComment()" style="background:var(--primary); color:#fff; border:none; padding:0 15px; border-radius:12px; font-weight:700;">发送</button>
            </div>
        </div>
    </div>

    <div class="modal" id="fitModal">
        <div class="modal-content">
            <h3 id="fitDateTitle" style="margin-top:0;">打卡记录</h3>
            <select id="fitMode" onchange="toggleFitDetail()" style="width:100%; padding:14px; border-radius:12px; border:none; background:#F2F2F7; margin-bottom:15px;">
                <option value="fit">🔥 训练模式</option>
                <option value="rest">☕ 休息模式</option>
            </select>
            <div id="fitDetail">
                <select id="fitType" style="width:100%; padding:14px; border-radius:12px; border:none; background:#F2F2F7; margin-bottom:15px;">
                    <option value="9.5">🏃 强力跑步</option><option value="12">🏋️ 力量训练</option>
                </select>
                <div style="background:#F2F2F7; padding:12px; border-radius:12px; display:flex; align-items:center; margin-bottom:15px;">
                    <input type="number" id="fitMin" value="45" style="border:none; background:none; width:60px; font-size:1rem; font-weight:bold;"> 
                    <span style="color:var(--gray); font-size:0.8rem;">分钟</span>
                </div>
            </div>
            <button class="btn-main" onclick="saveFit()">保存并同步</button>
            <button class="btn-ghost" onclick="undoFit()">撤回打卡</button>
            <button onclick="closeModals()" style="width:100%; border:none; background:none; color:var(--gray); margin-top:5px;">取消</button>
        </div>
    </div>

    <div class="modal" id="postModal">
        <div class="modal-content">
            <h3 style="margin-top:0;">发布瞬间</h3>
            <select id="pubRole" style="width:100%; padding:12px; border-radius:10px; border:none; background:#f2f2f7; margin-bottom:15px;">
                <option value="cy">林晨羽</option><option value="sg">大帅哥</option>
            </select>
            <input type="file" id="postFile" accept="image/*" style="margin-bottom:15px; font-size:0.8rem;">
            <textarea id="postText" placeholder="心情..." style="width:100%; height:80px; border-radius:12px; border:none; background:#f2f2f7; padding:12px; margin-bottom:15px; outline:none; box-sizing:border-box;"></textarea>
            <button class="btn-main" onclick="handlePublish()">发布并同步</button>
            <button onclick="closeModals()" style="width:100%; border:none; background:none; color:var(--gray); margin-top:5px;">取消</button>
        </div>
    </div>

    <script>
        // --- 云端配置 (精准修正 URL 路径) ---
        const KV_URL = "https://pleasing-hare-88101.upstash.io";
        const KV_TOKEN = "gQAAAAAAAVglAAIncDJiZmE2Mjk5YWZkZTY0YTBmYTBlowU0YWI0NmJiMzUwNHAyODgxMDE";

        let db = { calendar: Array.from({length:12}, () => ({})), messages: [], posts: [] };
        let curM = new Date().getMonth(), curD = 1, activePostId = null;

        // --- 云端逻辑 ---
        async function loadFromCloud() {
            try {
                const res = await fetch(`${KV_URL}/get/app_data`, {
                    headers: { Authorization: `Bearer ${KV_TOKEN}` }
                });
                const result = await res.json();
                if (result.result) {
                    try {
                        db = JSON.parse(result.result);
                        updateUI();
                        if(document.body.classList.contains('space-active')) renderFeed();
                        document.getElementById('syncStatus').innerText = "✅ 云端已同步";
                    } catch(e) {
                        document.getElementById('syncStatus').innerText = "💡 脏数据清理中...";
                        save(); 
                    }
                } else {
                    document.getElementById('syncStatus').innerText = "💡 空间已连接";
                }
            } catch (e) { document.getElementById('syncStatus').innerText = "⚠️ 连接失败"; }
        }

        async function save() {
            document.getElementById('syncStatus').innerText = "⏳ 同步中...";
            try {
                // 修复：确保 URL 指向具体的 set 路径
                await fetch(`${KV_URL}/set/app_data`, {
                    method: 'POST',
                    headers: { Authorization: `Bearer ${KV_TOKEN}` },
                    body: JSON.stringify(db)
                });
                document.getElementById('syncStatus').innerText = "✅ 云端已同步";
            } catch (e) { document.getElementById('syncStatus').innerText = "⚠️ 同步失败"; }
        }

        // --- 交互逻辑 ---
        function toggleSpace(a) { document.body.classList.toggle('space-active', a); if(a) renderFeed(); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function toggleFitDetail() { document.getElementById('fitDetail').style.display = document.getElementById('fitMode').value === 'rest' ? 'none' : 'block'; }
        
        function openComments(id) {
            activePostId = id;
            const post = db.posts.find(p => p.id === id);
            document.getElementById('drawerList').innerHTML = (post.comments || []).map(c => `<div style="margin-bottom:12px; font-size:0.9rem;"><b>${c.user}:</b> ${c.txt}</div>`).join('');
            document.getElementById('commentDrawer').classList.add('active');
        }
        function closeDrawer() { document.getElementById('commentDrawer').classList.remove('active'); }
        function addEmoji(e) { document.getElementById('drawerIn').value += e; }

        function submitComment() {
            const txt = document.getElementById('drawerIn').value; if(!txt) return;
            db.posts = db.posts.map(p => {
                if(p.id === activePostId) {
                    const c = p.comments || [];
                    c.push({ user: "合伙人", txt });
                    return {...p, comments: c};
                }
                return p;
            });
            document.getElementById('drawerIn').value = ''; openComments(activePostId); renderFeed(); save();
        }

        function initCalendar() {
            const mb = document.getElementById('monthBar'); mb.innerHTML = '';
            ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"].forEach((m, i) => {
                const d = document.createElement('div'); d.className = `m-item ${i===curM?'active':''}`; d.innerText = m;
                d.onclick = () => { curM = i; initCalendar(); updateUI(); }; mb.appendChild(d);
            });
            updateUI();
        }

        function updateUI() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            const days = new Date(2026, curM + 1, 0).getDate();
            for(let i=1; i<=days; i++) {
                const data = db.calendar[curM][i] || {mode:''};
                const node = document.createElement('div'); node.className = `day ${data.mode}`;
                node.innerHTML = `<span style="font-weight:700;">${i}</span>`;
                node.onclick = () => { curD = i; document.getElementById('fitDateTitle').innerText = `${curM+1}月${i}日`; openModal('fitModal'); };
                grid.appendChild(node);
            }
            document.getElementById('msgList').innerHTML = db.messages.map(m => `<div class="msg-item">${m}</div>`).join('');
        }

        function saveFit() {
            const mode = document.getElementById('fitMode').value;
            db.calendar[curM][curD] = { mode };
            closeModals(); updateUI(); save();
        }

        function undoFit() { delete db.calendar[curM][curD]; closeModals(); updateUI(); save(); }

        function handlePublish() {
            const file = document.getElementById('postFile').files[0];
            const text = document.getElementById('postText').value;
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                db.posts.unshift({ id: Date.now(), role: document.getElementById('pubRole').value, img: e.target.result, text, likes: 0, comments: [] });
                closeModals(); renderFeed(); save();
            }
            reader.readAsDataURL(file);
        }

        function renderFeed() {
            document.getElementById('insFeed').innerHTML = db.posts.map(p => `
                <div class="ins-post">
                    <div class="post-header">
                        <div class="avatar ${p.role==='cy'?'avatar-cy':'avatar-sg'}">${p.role==='cy'?'羽':'帅'}</div>
                        <div style="font-weight:700; font-size:0.9rem;">${p.role==='cy'?'林晨羽':'大帅哥'}</div>
                    </div>
                    <img src="${p.img}" class="post-img">
                    <div class="post-actions">
                        <span class="action-icon" onclick="openComments(${p.id})">💬</span>
                    </div>
                    <div style="padding:0 15px 15px; font-size:0.85rem;"><b>${p.role==='cy'?'羽':'帅'}:</b> ${p.text}</div>
                </div>`).join('');
        }

        function sendMsg() {
            const i = document.getElementById('msgIn'); if(!i.value) return;
            db.messages.push(`<b>${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</b>: ${i.value}`);
            if(db.messages.length>15) db.messages.shift();
            i.value=''; updateUI(); save();
        }

        window.onload = () => { loadFromCloud(); initCalendar(); };
    </script>
</body>
</html>
